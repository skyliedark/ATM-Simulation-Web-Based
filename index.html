<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusBank ATM Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* Include your CSS styles here */
</style>
</head>
<body>
<div class="atm-wrapper">
  <div class="atm-machine">
    <div class="atm-header">
      <div class="bank-name">NEXUS<span>BANK</span></div>
      <div style="font-size:10px;color:var(--muted);letter-spacing:2px;">ATM-7741</div>
      <div class="status-dot"></div>
    </div>

    <div class="atm-screen">
      <div class="screen-content" id="screen"></div>
    </div>

    <div class="keypad-section" id="keypad"></div>

    <div class="card-slot-area">
      <div class="slot-label">CARD</div>
      <div class="card-slot"></div>
      <div class="slot-label">CASH</div>
      <div class="cash-slot"></div>
    </div>

    <div class="receipt-ticker">NEXUSBANK ATM ● SECURE TRANSACTION PORTAL ● FDIC INSURED ● 24/7 SERVICE ● PIN PROTECTED ● PRESS INSERT CARD TO BEGIN ●</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
